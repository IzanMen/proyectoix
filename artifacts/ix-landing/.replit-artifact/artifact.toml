kind = "web"
previewPath = "/"
title = "Proyecto IX"
version = "1.0.0"
id = "artifacts/ix-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23423

[services.development]
run = "pnpm --filter @workspace/ix-landing run dev"

[services.production]

[services.production.build]
args = ["pnpm", "--filter", "@workspace/ix-landing", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"
BASE_PATH = "/"
PORT = "23423"

[services.production.run]
args = ["node", "artifacts/ix-landing/server.mjs"]

[services.production.run.env]
PORT = "23423"
NODE_ENV = "production"

[services.production.health.startup]
path = "/healthz"

[services.env]
PORT = "23423"
BASE_PATH = "/"
